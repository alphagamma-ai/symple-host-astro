<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SympleHost Partner API Reference</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%94%8C%3C/text%3E%3C/svg%3E" />
  <style>
    body { margin: 0; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <!--
    Scalar rendering of the hand-authored Partner API spec.

    Spec  : /partner-api/openapi.yaml   (apps/frontend/public/partner-api/openapi.yaml)
    Bundle: /vendor/scalar/standalone.js  (self-hosted, no CDN / SRI)
            Refresh with:
              curl -sL https://cdn.jsdelivr.net/npm/@scalar/api-reference@1.59.3/dist/browser/standalone.js \
                -o apps/frontend/public/vendor/scalar/standalone.js

    View at: http://localhost:3002/partner-api-scalar.html
    NOTE: HMAC endpoints — "Try it" cannot auto-sign. Use the code samples (curl/Node/Python).
  -->
  <script id="api-reference" data-url="/partner-api/openapi.yaml"></script>

  <script>
    document.getElementById('api-reference').dataset.configuration = JSON.stringify({
      // Disable Scalar's AI agent — hides both the "Ask AI" button and the
      // "Connect MCP" / generate-MCP layer (both gated by agentEnabled = !agent.disabled).
      agent: { disabled: true },
      theme: 'purple',
      darkMode: false,
      layout: 'modern',
      showSidebar: true,
      searchHotKey: 'k',
      hiddenClients: [],
      servers: [
        { url: 'https://platform-dev.symplehost.ai', description: 'Development (hosted)' },
        { url: 'https://platform.symplehost.ai', description: 'Production' },
        { url: 'http://localhost:3000', description: 'Local' }
      ],
      customCss: `.scalar-api-reference{--scalar-color-accent:#7C3AED;--scalar-font:'Inter',system-ui,sans-serif;}`
    });
  </script>

  <script src="/vendor/scalar/standalone.js"></script>
</body>
</html>
