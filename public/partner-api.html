<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SympleHost — Partner API Reference</title>
<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,sans-serif;color:#1c2024;background:#fff}
  pre,code,.mono{font-family:"SF Mono",Monaco,"Cascadia Code",Consolas,monospace}
  a{text-decoration:none;cursor:pointer}
  button,select{font-family:inherit;cursor:pointer}

  .tag{display:inline-block;font-size:11px;font-weight:700;border-radius:5px;padding:2px 7px;letter-spacing:.3px;white-space:nowrap}
  .m-get{background:#dcfce7;color:#15803d}.m-post{background:#ede9fe;color:#6d28d9}
  .m-del{background:#fee2e2;color:#b91c1c}.m-patch{background:#fef3c7;color:#b45309}.m-put{background:#fef3c7;color:#b45309}

  /* top bar */
  #top{position:fixed;inset:0 0 auto 0;height:56px;z-index:20;display:flex;align-items:center;gap:16px;padding:0 22px;background:#fff;border-bottom:1px solid #ece7f5}
  #top .logo{display:flex;align-items:center;gap:9px;font-weight:800;font-size:16px;color:#1c2024}
  #top .logo .dot{width:22px;height:22px;border-radius:6px;background:linear-gradient(135deg,#9333EA,#7c3aed)}
  #top .sub{font-size:12px;color:#8a9099;border-left:1px solid #ece7f5;padding-left:16px}
  #top input{margin-left:auto;background:#faf8ff;border:1px solid #ece7f5;border-radius:8px;padding:8px 12px;font-size:13px;width:230px;color:#1c2024}
  #themeBtn{background:#f5f0ff;color:#7c3aed;border:1px solid #e6d6fb;border-radius:9px;padding:8px 13px;font-size:13px;font-weight:600}

  .cols{position:fixed;inset:56px 0 0 0;display:grid;grid-template-columns:272px minmax(0,1fr) 480px}
  .nav{border-right:1px solid #ece7f5;padding:18px 14px;overflow:auto}
  .nav .grp{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:#8a9099;margin:16px 6px 6px;font-weight:700}
  .nav a{display:flex;align-items:center;gap:8px;padding:6px 9px;border-radius:7px;color:#4a5159;font-size:13px}
  .nav a:hover{background:#f7f4fc}
  .nav a.on{background:#f3ecfe;color:#7c3aed;font-weight:600}
  .nav a .tag{transform:scale(.82);transform-origin:left;flex:none}
  .nav a .nm{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  .doc{overflow:auto;padding:30px 40px}
  .doc .crumb{font-size:12.5px;color:#8a9099;margin-bottom:10px}
  .doc h1{font-size:25px;margin:0 0 6px}
  .doc .ep{display:flex;align-items:center;gap:9px;margin:8px 0 14px;font-size:13.5px;flex-wrap:wrap}
  .doc .ep code{font-family:"SF Mono",monospace;background:#f3f5f7;border:1px solid #e6e9ee;border-radius:6px;padding:3px 8px;color:#1c2024}
  .doc .pill{font-size:11px;font-weight:700;border-radius:20px;padding:3px 10px}
  .pill-basic{background:#dcfce7;color:#15803d;border:1px solid #bbf7d0}
  .pill-hmac{background:#f3ecfe;color:#7c3aed;border:1px solid #e6d6fb}
  .pill-scope{background:#eef2ff;color:#4338ca;border:1px solid #c7d2fe;font-family:"SF Mono",monospace;font-weight:600}
  .pill-idem{background:#e0f2fe;color:#0369a1;border:1px solid #bae6fd}
  .doc .lede{color:#5a626b;font-size:14.5px;line-height:1.7;margin:0 0 4px;max-width:680px}
  .doc .consumed{font-size:12.5px;color:#8a9099;margin:8px 0 4px}
  .doc .consumed code{background:#f6f7f9;border-radius:4px;padding:1px 6px;color:#4a5159}
  .doc .secl{font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:#8a9099;font-weight:700;margin:24px 0 2px;max-width:680px}
  .attr{padding:11px 0;border-bottom:1px solid #eceef1;max-width:680px}
  .attr .ah{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
  .attr .an{font-family:"SF Mono",monospace;font-size:13.5px;color:#1c2024;font-weight:600}
  .attr .at{font-size:12px;color:#8a9099}
  .attr .rq{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:#c2410c}
  .attr .op{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:#9aa1ad}
  .attr .pii{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:#9333ea}
  .attr .ad{color:#5a626b;font-size:13.5px;margin-top:3px;line-height:1.55}
  .warn{display:flex;gap:10px;background:#fff8ed;border:1px solid #fde6c2;border-left:3px solid #f59e0b;border-radius:10px;padding:12px 14px;margin:16px 0;font-size:13.5px;color:#7a5618;line-height:1.55;max-width:680px}
  .warn .wi{color:#d97706;font-weight:800;flex:none}
  .info{display:flex;gap:10px;background:#f3ecfe;border:1px solid #e6d6fb;border-left:3px solid #9333ea;border-radius:10px;padding:12px 14px;margin:16px 0;font-size:13.5px;color:#5b3a8a;line-height:1.55;max-width:680px}
  .info .wi{color:#7c3aed;font-weight:800;flex:none}
  .ov{max-width:700px}
  .ov p{color:#3d3b35;font-size:14.5px;line-height:1.75}
  .ov code{background:#efece3;border-radius:5px;padding:2px 6px;font-size:13.5px;color:#7a3b22}
  .ov table{width:100%;border-collapse:collapse;font-size:13.5px;margin:8px 0}
  .ov td,.ov th{border-bottom:1px solid #eceef1;padding:8px;color:#4a5159;vertical-align:top;text-align:left}
  .ov th{font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:#8a9099}
  .ov td b{color:#1c2024}
  .ov td code{font-size:12.5px}

  .rail{background:#f7f3fd;border-left:1px solid #ece7f5;padding:22px 20px;overflow:auto}
  .rail .panel{position:sticky;top:0}
  .card{background:#fff;border:1px solid #ece7f5;border-radius:12px;overflow:hidden;margin-bottom:14px;box-shadow:0 1px 2px rgba(80,40,140,.05)}
  .card .ch{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 12px;border-bottom:1px solid #f0ebf8}
  .card .ch .title{font-size:12px;color:#6b7280;font-weight:600}
  .card select{appearance:none;-webkit-appearance:none;background:#f5f0ff;border:1px solid #e6d6fb;border-radius:7px;color:#7c3aed;font-weight:600;font-size:12px;padding:5px 26px 5px 10px;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' stroke='%237c3aed' fill='none' stroke-width='1.4'/></svg>");background-repeat:no-repeat;background-position:right 9px center}
  .card .pill200{font-size:11px;font-weight:700;background:#dcfce7;color:#15803d;border:1px solid #bbf7d0;border-radius:20px;padding:2px 9px}
  .card pre{margin:0;padding:14px;background:transparent;color:#24283b;white-space:pre;overflow:auto;font-size:12.5px;line-height:1.65}
  .card pre .s{color:#15803d}.card pre .k{color:#7c3aed}.card pre .c{color:#9aa1ad}.card pre .u{color:#0e7490}
  .card pre .num{color:#b5651d}.card pre .lit{color:#0e7490}

  /* dark */
  body.dark{background:#0c0e11;color:#e6e8ec}
  body.dark .cols{background:#0c0e11}
  body.dark #top{background:#101216;border-color:#1e2228}
  body.dark #top .logo{color:#e6e8ec}
  body.dark #top .sub{color:#7b8190;border-color:#1e2228}
  body.dark #top input{background:#15181d;border-color:#262b33;color:#e6e8ec}
  body.dark #themeBtn{background:#2a1f3d;color:#c084fc;border-color:#3a2c52}
  body.dark .nav{border-color:#1e2228}
  body.dark .nav .grp{color:#7b8190}
  body.dark .nav a{color:#aab1bd}
  body.dark .nav a:hover{background:#15181d}
  body.dark .nav a.on{background:#2a1f3d;color:#c084fc}
  body.dark .doc .crumb,body.dark .doc .consumed{color:#7b8190}
  body.dark .doc .ep code{background:#15181d;border-color:#262b33;color:#e6e8ec}
  body.dark .doc .lede,body.dark .ov p{color:#9aa1ad}
  body.dark .doc .secl{color:#7b8190}
  body.dark .attr{border-color:#1e2228}
  body.dark .attr .an{color:#e6e8ec}
  body.dark .attr .ad{color:#9aa1ad}
  body.dark .ov code{background:#241d33;color:#d8b4fe}
  body.dark .ov td,body.dark .ov th{border-color:#1e2228;color:#9aa1ad}
  body.dark .ov td b{color:#e6e8ec}
  body.dark .rail{background:#121317;border-color:#1e2228}
  body.dark .card{background:#15181d;border-color:#262b33;box-shadow:none}
  body.dark .card .ch{border-color:#23272e}
  body.dark .card .ch .title{color:#9aa1ad}
  body.dark .card select{background-color:#1f242c;border-color:#323a45;color:#c084fc;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' stroke='%23c084fc' fill='none' stroke-width='1.4'/></svg>")}
  body.dark .card .pill200{background:#0f2f22;color:#3fb950;border-color:#15412e}
  body.dark .card pre{color:#cdd2da}
  body.dark .card pre .s{color:#7ee787}body.dark .card pre .k{color:#c084fc}body.dark .card pre .c{color:#7b8190}body.dark .card pre .u{color:#56d4dd}body.dark .card pre .num{color:#e0a878}body.dark .card pre .lit{color:#56d4dd}
  body.dark .warn{background:#2a2113;border-color:#4a3a1c;color:#e8c98a}
  body.dark .info{background:#1e1530;border-color:#3a2c52;color:#d8b4fe}
  body.dark .doc .consumed code{background:#1a1d23;color:#aab1bd}
</style>
</head>
<body>
<div id="top">
  <span class="logo"><span class="dot"></span> SympleHost</span>
  <span class="sub">Partner API Reference · external integration surface (API key)</span>
  <input id="search" placeholder="Search endpoints…">
  <button id="themeBtn">🌙 Dark</button>
</div>
<div class="cols">
  <aside class="nav" id="nav"></aside>
  <main class="doc" id="doc"></main>
  <aside class="rail"><div class="panel" id="code"></div></aside>
</div>

<script>
const BASE = "https://platform.symplehost.ai";
const PREFIX = "/api/v1/partner";

/* ====================================================================
   Partner API — curated reference for the external (PMS/partner)
   integration surface. Auth = per-account PartnerApiKey:
     • HTTP Basic (key_id:secret) — read-only, non-PII scopes only
     • HMAC-SHA256 signed         — required for any sensitive scope
   Field sets mirror what the SympleHost frontend consumes today; the
   partner surface returns a stable, ACL-free, versioned subset.
   ==================================================================== */

const SENSITIVE = ["guest_name:read","guest_contact:read","message_content:read",
  "transactions:read","reservations:write","pricing:write","availability:write","properties:link","messaging:send",
  "payments:read","payments:write"];

const DATA = [
 { id:"overview", g:"Getting started", name:"Overview", overview:true },
 { id:"auth",     g:"Getting started", name:"Authentication", auth:true },
 { id:"conventions", g:"Getting started", name:"Conventions", conventions:true },
 { id:"webhooks", g:"Getting started", name:"Verifying webhooks", webhooks:true },

 /* ---------------- Properties (Listings) ---------------- */
 { id:"prop-list", g:"Properties", method:"GET", path:PREFIX+"/properties", scope:"properties:read", mode:"basic",
   name:"List properties", summary:"List the account's properties (listings + units). Keyset-paginated. Parent listings and their per-unit children are both returned; use is_parent / parent_listing_id to reconstruct the tree.",
   query:[{n:"updated_since",t:"date-time",d:"Initial seed for the feed (first page only). Afterwards use cursor."},
          {n:"cursor",t:"string",d:"Opaque keyset cursor from meta.next_cursor."},
          {n:"per_page",t:"int",d:"Default 25, max 100."}],
   resp:'{\n  "data": [{\n    "id": "<uuid>", "name": "Villa Rosa", "property_type": "villa", "listing_type": "entire_place",\n    "timezone": "Asia/Seoul", "active": true, "currency": "USD",\n    "bedrooms": 2, "bathrooms": 1, "beds": 3, "max_guests": 4,\n    "check_in_time": "15:00", "check_out_time": "11:00",\n    "address": { "city": "Seoul", "state": null, "country": "KR", "postal_code": "04524", "latitude": 37.56, "longitude": 126.99 },\n    "amenities": ["wifi","kitchen","pool"],\n    "is_parent": true, "is_unit": false, "parent_listing_id": null, "unit_count": 3,\n    "pricing_owner": "partner", "owned_by_you": true,\n    "average_rating": 4.8, "total_reviews": 12,\n    "external_ref": "PMS-1001",\n    "created_at": "2026-01-04T09:00:00Z", "updated_at": "2026-06-10T11:20:00Z"\n  }],\n  "meta": { "next_cursor": "ey…", "has_more": true, "payload_version": "v1" }\n}' },

 { id:"prop-get", g:"Properties", method:"GET", path:PREFIX+"/properties/{id}", scope:"properties:read", mode:"basic",
   name:"Retrieve property", summary:"Single property by SympleHost listing id or your linked external_ref.",
   pathp:[{n:"id",t:"uuid | string",d:"SH listing id or external_ref."}],
   resp:'{\n  "data": {\n    "id": "<uuid>", "name": "Villa Rosa · Unit 2", "property_type": "villa", "listing_type": "entire_place",\n    "timezone": "Asia/Seoul", "active": true, "currency": "USD",\n    "bedrooms": 1, "bathrooms": 1, "beds": 1, "max_guests": 2,\n    "check_in_time": "15:00", "check_out_time": "11:00",\n    "address": { "city": "Seoul", "country": "KR", "postal_code": "04524" },\n    "amenities": ["wifi","kitchen"],\n    "is_parent": false, "is_unit": true, "parent_listing_id": "<uuid>", "unit_number": "2",\n    "pricing_owner": "partner", "owned_by_you": true, "external_ref": "PMS-1001-U2",\n    "created_at": "2026-01-04T09:00:00Z", "updated_at": "2026-06-10T11:20:00Z"\n  }\n}' },

 { id:"prop-link", g:"Properties", method:"POST", path:PREFIX+"/properties/{id}/link", scope:"properties:link", mode:"hmac", idem:true,
   name:"Link property", summary:"Store your external reference against a SH listing so subsequent calls can address it by external_ref. Idempotent on (key, external_ref).",
   pathp:[{n:"id",t:"uuid",d:"SH listing id."}],
   body:[{n:"external_ref",t:"string",r:true,d:"Your PMS identifier for this property."}],
   status:"201", resp:'{\n  "data": { "listing_id": "<uuid>", "external_ref": "PMS-1001", "linked_at": "2026-06-15T10:00:00Z" }\n}' },

 /* ---------------- Calendar & availability ---------------- */
 { id:"cal-get", g:"Calendar & availability", method:"GET", path:PREFIX+"/listings/{id}/calendar", scope:"properties:read", mode:"basic",
   name:"Get calendar", summary:"Per-day availability + resolved nightly price over a date range. display_price reflects the active pricing owner (partner_rate in partner mode, SH pricing otherwise). end_date is inclusive.",
   pathp:[{n:"id",t:"uuid | string",d:"SH listing id or external_ref."}],
   query:[{n:"start_date",t:"date",r:true,d:"YYYY-MM-DD (first night)."},
          {n:"end_date",t:"date",r:true,d:"YYYY-MM-DD inclusive."},
          {n:"updated_since",t:"date-time",d:"Only days changed since (incremental sync)."}],
   resp:'{\n  "data": [{\n    "date": "2026-07-02", "is_blocked": false, "block_reason": null,\n    "stop_sell": false, "closed_to_arrival": false, "closed_to_departure": false,\n    "min_stay": 2, "max_stay": null,\n    "display_price": 140.0, "display_source": "partner", "currency": "USD",\n    "available": true\n  }],\n  "meta": { "listing_id": "<uuid>", "pricing_owner": "partner", "currency": "USD", "payload_version": "v1" }\n}' },

 { id:"avail-put", g:"Calendar & availability", method:"PUT", path:PREFIX+"/listings/{id}/availability", scope:"availability:write", mode:"hmac", idem:true,
   name:"Write availability", summary:"Set blocks and stay restrictions over a date range. SH bookings always win — pushing is_blocked=false over booked nights will NOT open them. Changes sync out to OTAs via Channex (debounced).",
   pathp:[{n:"id",t:"uuid | string",d:"SH listing id or external_ref."}],
   body:[{n:"dates",t:"array",r:true,d:"Up to 730 entries: { date, is_blocked, stop_sell, closed_to_arrival, closed_to_departure, min_stay, max_stay }."}],
   warn:"Inventory-count (per-date total_availability) writes are <b>not</b> supported in v1 — availability is blocks + restrictions only. Set <code>is_blocked</code> / <code>stop_sell</code> instead.",
   resp:'{\n  "data": { "listing_id": "<uuid>", "updated": 14, "synced": "queued" },\n  "meta": { "payload_version": "v1" }\n}' },

 /* ---------------- Rates & pricing ---------------- */
 { id:"price-connect", g:"Rates & pricing", method:"POST", path:PREFIX+"/listings/{id}/pricing/connect", scope:"pricing:write", mode:"hmac", idem:true,
   name:"Take pricing ownership", summary:"Flip the listing to pricing_owner=partner. While you own pricing, SH's host pricing UI is read-only for rates and any dynamic-pricing (PriceLabs) integration is paused. Connect on a parent cascades to its inherit_pricing child units.",
   pathp:[{n:"id",t:"uuid | string",d:"SH listing id (parent or standalone)."}],
   warn:"Reject on an <code>inherit_pricing</code> child unit directly — connect the <b>parent</b>; ownership cascades to its units.",
   status:"200", resp:'{\n  "data": { "listing_id": "<uuid>", "pricing_owner": "partner", "units_affected": 3, "pricelabs_paused": true }\n}' },

 { id:"price-put", g:"Rates & pricing", method:"PUT", path:PREFIX+"/listings/{id}/pricing", scope:"pricing:write", mode:"hmac", idem:true,
   name:"Set nightly rates", summary:"Write your nightly rates (partner_rate) for a date range. Requires pricing_owner=partner AND that YOUR key owns it. Currency must equal the account currency. Range cap 730 days. Rates flow to OTAs via Channex.",
   pathp:[{n:"id",t:"uuid | string",d:"SH listing id or external_ref."}],
   body:[{n:"currency",t:"string",r:true,d:"Must equal account currency (else 422 currency_mismatch)."},
         {n:"rates",t:"object",r:true,d:"{ \\\"YYYY-MM-DD\\\": amount } map, or an array of { date, amount }."}],
   warn:"<code>409 pricing_not_owned_by_partner</code> if the listing is in SH mode; <code>409 pricing_owned_by_other_partner</code> if a different key owns it. Take ownership via <code>POST …/pricing/connect</code> first.",
   resp:'{\n  "data": { "listing_id": "<uuid>", "currency": "USD", "dates_written": 30, "synced": "queued" },\n  "meta": { "payload_version": "v1" }\n}' },

 { id:"price-disconnect", g:"Rates & pricing", method:"POST", path:PREFIX+"/listings/{id}/pricing/disconnect", scope:"pricing:write", mode:"hmac", idem:true,
   name:"Release pricing ownership", summary:"Flip back to pricing_owner=sh. Non-destructive: your partner_rate rows go dormant (kept for audit/re-connect), the host's own rates resurface instantly, and the paused PriceLabs config is auto-re-enabled.",
   pathp:[{n:"id",t:"uuid | string",d:"SH listing id."}],
   status:"200", resp:'{\n  "data": { "listing_id": "<uuid>", "pricing_owner": "sh", "pricelabs_resumed": true }\n}' },

 /* ---------------- Reservations ---------------- */
 { id:"res-list", g:"Reservations", method:"GET", path:PREFIX+"/reservations", scope:"reservations:read", mode:"basic",
   name:"List reservations", summary:"Keyset-paginated reservation feed (at-least-once; dedupe by id). Financial totals require transactions:read; guest PII requires the guest_* scopes (HMAC). Without those scopes the fields are masked, not absent.",
   query:[{n:"status",t:"string",d:"pending_confirmation | partially_confirmed | confirmed | completed | cancelled."},
          {n:"source_platform",t:"string",d:"direct | airbnb | booking | vrbo | expedia."},
          {n:"date_from",t:"date",d:"start_date ≥ value."},{n:"date_to",t:"date",d:"start_date ≤ value."},
          {n:"updated_since",t:"date-time",d:"Feed seed (first page)."},{n:"cursor",t:"string",d:"Keyset cursor."},
          {n:"per_page",t:"int",d:"Default 25, max 100."}],
   resp:'{\n  "data": [{\n    "id": "<uuid>", "reservation_number": "RES-202607-0091",\n    "status": "confirmed", "payment_status": "paid", "source_platform": "airbnb",\n    "start_date": "2026-07-02", "end_date": "2026-07-05", "nights": 3, "guest_count": 2,\n    "currency": "USD", "total_amount": 450.0,\n    "property": { "id": "<uuid>", "name": "Villa Rosa", "external_ref": "PMS-1001" },\n    "guest": { "id": "<uuid>", "name": "Ada Lovelace", "email": "ada@example.com", "phone": "+15551234567", "is_vip": false },\n    "channex_booking_id": "chx_8f2a", "created_at": "2026-06-01T08:00:00Z", "updated_at": "2026-06-10T09:00:00Z"\n  }],\n  "meta": { "next_cursor": "ey…", "has_more": false, "masked_fields": [], "payload_version": "v1" }\n}' },

 { id:"res-get", g:"Reservations", method:"GET", path:PREFIX+"/reservations/{id}", scope:"reservations:read", mode:"basic",
   name:"Retrieve reservation", summary:"Single reservation with an embedded payment/transaction summary and the guest profile (PII subject to scopes). Self-contained — no second call needed.",
   pathp:[{n:"id",t:"uuid | string",d:"Reservation id or reservation_number."}],
   resp:'{\n  "data": {\n    "id": "<uuid>", "reservation_number": "RES-202607-0091", "status": "confirmed",\n    "payment_status": "partial", "source_platform": "direct",\n    "start_date": "2026-07-02", "end_date": "2026-07-05", "nights": 3, "guest_count": 2,\n    "currency": "USD",\n    "totals": { "total_amount": 450.0, "amount_paid": 200.0, "amount_due": 250.0, "host_payout": 405.0, "ota_commission": 0.0 },\n    "price_breakdown": { "accommodation": 420.0, "fees": 30.0, "taxes_inclusive": 0.0 },\n    "property": { "id": "<uuid>", "name": "Villa Rosa", "external_ref": "PMS-1001", "check_in_time": "15:00" },\n    "guest": { "id": "<uuid>", "name": "Ada Lovelace", "email": "ada@example.com", "phone": "+15551234567", "country": "GB", "is_vip": false, "total_bookings": 3 }\n  }\n}' },

 { id:"res-create", g:"Reservations", method:"POST", path:PREFIX+"/reservations", scope:"reservations:write", mode:"hmac", idem:true,
   name:"Create reservation", summary:"Push a booking you captured in your own system into SympleHost. SH creates (or matches) the guest, books the dates (which blocks the calendar + syncs out to OTAs via Channex), and returns the reservation. Pass external_ref so the booking is linked and de-duplicated. Currency must equal the account currency.",
   body:[{n:"listing_id",t:"uuid | string",r:true,d:"SH listing id or your linked external_ref."},
         {n:"check_in",t:"date",r:true,d:"YYYY-MM-DD."},

function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function hl(code){
  return esc(code).replace(/(^[ \t]*(?:#|\/\/).*$)|("(?:[^"\\]|\\.)*"(\s*:)?)|\b(true|false|null|None|True|False)\b|(-?\d+(?:\.\d+)?)/gm, function(m,c,str,colon,lit,num){
    if(c) return '<span class="c">'+c+'</span>';
    if(str){ if(colon) return '<span class="k">'+str.slice(0,str.length-colon.length)+'</span>'+colon; return '<span class="s">'+str+'</span>'; }
    if(lit) return '<span class="lit">'+lit+'</span>';
    if(num) return '<span class="num">'+num+'</span>';
    return m;
  });
}

/* ---- request samples ---- */
function pathSub(ep){ return ep.path.replace(/\{[^}]+\}/g,"<uuid>"); }
function bodyJson(ep){ const f=reqFields(ep.body); if(!f.length) return null; return "{\n"+f.map(p=>'  "'+p.n+'": '+bodyVal(p)).join(",\n")+"\n}"; }
function curlFor(ep){
  const path=pathSub(ep);
  const accept='-H "Accept: application/vnd.symplehost.partner.v1+json"';
  if(ep.mode==="basic"){
    const qs=reqFields(ep.query).map(p=>p.n+"="+qval(p)); const q=qs.length?"?"+qs.join("&"):"";
    return '# '+ep.name+'  ·  scope: '+ep.scope+'\ncurl "'+BASE+path+q+'" \\\n  -u "$SH_KEY_ID:$SH_SECRET" \\\n  '+accept;
  }
  // HMAC
  const body=bodyJson(ep);
  const lines=[];
  lines.push('# '+ep.name+'  ·  scope: '+ep.scope+'  (HMAC required)');
  lines.push('# sig = hex( HMAC-SHA256( $SH_SECRET,');
  lines.push('#         "'+ep.method+'\\n'+ep.path+'\\n$TS\\n$(printf %s "$BODY" | sha256)" ) )');
  lines.push('curl -X '+ep.method+' "'+BASE+path+'" \\');
  lines.push('  -H "X-SH-Key-Id: $SH_KEY_ID" \\');
  lines.push('  -H "X-SH-Timestamp: $TS" \\');
  if(ep.method!=="GET") lines.push('  -H "X-SH-Nonce: $(uuidgen)" \\');
  lines.push('  -H "X-SH-Signature: $SIG" \\');
  if(ep.idem) lines.push('  -H "Idempotency-Key: $(uuidgen)" \\'+(ep.idemRequired?'   # mandatory':''));
  if(body){ lines.push('  -H "Content-Type: application/json" \\'); lines.push("  -d \"$BODY\""); }
  else { lines[lines.length-1]=lines[lines.length-1].replace(/ \\$/,''); }
  return lines.join("\n");
}
function nodeFor(ep){
  const path=pathSub(ep); const body=bodyJson(ep);
  if(ep.mode==="basic"){
    const qs=reqFields(ep.query).map(p=>p.n+"="+qval(p)); const q=qs.length?"?"+qs.join("&"):"";
    return 'const auth = "Basic " + Buffer.from(`${KEY_ID}:${SECRET}`).toString("base64");\n'+
      'const res = await fetch("'+BASE+path+q+'", {\n  headers: {\n    Authorization: auth,\n    Accept: "application/vnd.symplehost.partner.v1+json",\n  },\n});\nconst json = await res.json();';
  }
  const b = body ? body : "";
  return 'import { createHmac, createHash, randomUUID } from "crypto";\n\n'+
    'const method = "'+ep.method+'", path = "'+ep.path+'";\n'+
    (body? 'const body = JSON.stringify('+ (body.replace(/\n/g,"\n  ")) +');\n' : 'const body = "";\n')+
    'const ts = Math.floor(Date.now() / 1000).toString();\n'+
    'const bodyHash = createHash("sha256").update(body).digest("hex");\n'+
    'const canonical = `${method}\\n${path}\\n${ts}\\n${bodyHash}`;\n'+
    'const sig = createHmac("sha256", SECRET).update(canonical).digest("hex");\n\n'+
    'const res = await fetch("'+BASE+path+'", {\n  method,\n  headers: {\n    "X-SH-Key-Id": KEY_ID,\n    "X-SH-Timestamp": ts,\n'+
    (ep.method!=="GET" ? '    "X-SH-Nonce": randomUUID(),\n' : '')+
    '    "X-SH-Signature": sig,\n'+
    (ep.idem ? '    "Idempotency-Key": randomUUID(),'+(ep.idemRequired?' // mandatory':'')+'\n' : '')+
    (body ? '    "Content-Type": "application/json",\n' : '')+
    '    Accept: "application/vnd.symplehost.partner.v1+json",\n  },\n'+
    (body ? '  body,\n' : '')+
    '});\nconst json = await res.json();';
}
function pyFor(ep){
  const path=pathSub(ep); const body=bodyJson(ep);
  if(ep.mode==="basic"){
    const qs=reqFields(ep.query); const params = qs.length ? "\n    params={"+qs.map(p=>'"'+p.n+'": "'+qval(p)+'"').join(", ")+"}," : "";
    return 'import requests\n\nres = requests.get(\n    "'+BASE+path+'",\n    auth=(KEY_ID, SECRET),\n    headers={"Accept": "application/vnd.symplehost.partner.v1+json"},'+params+'\n)\ndata = res.json()';
  }
  return 'import time, json, hmac, hashlib, uuid, requests\n\n'+
    'method, path = "'+ep.method+'", "'+ep.path+'"\n'+
    (body? 'body = json.dumps('+pyDict(body)+')\n' : 'body = ""\n')+
    'ts = str(int(time.time()))\n'+
    'body_hash = hashlib.sha256(body.encode()).hexdigest()\n'+
    'canonical = f"{method}\\n{path}\\n{ts}\\n{body_hash}"\n'+
    'sig = hmac.new(SECRET.encode(), canonical.encode(), hashlib.sha256).hexdigest()\n\n'+
    'res = requests.request(method, "'+BASE+path+'",\n'+
    '    data=body,\n'+
    '    headers={\n        "X-SH-Key-Id": KEY_ID,\n        "X-SH-Timestamp": ts,\n'+
    (ep.method!=="GET" ? '        "X-SH-Nonce": str(uuid.uuid4()),\n' : '')+
    '        "X-SH-Signature": sig,\n'+
    (ep.idem ? '        "Idempotency-Key": str(uuid.uuid4()),'+(ep.idemRequired?'  # mandatory':'')+'\n' : '')+
    (body ? '        "Content-Type": "application/json",\n' : '')+
    '        "Accept": "application/vnd.symplehost.partner.v1+json",\n    },\n)\ndata = res.json()';
}
function pyDict(jsonStr){ return jsonStr.replace(/\btrue\b/g,"True").replace(/\bfalse\b/g,"False").replace(/\bnull\b/g,"None"); }

/* ---- JavaScript (browser / Deno / edge — Web Crypto) ---- */
function jsFor(ep){
  const path=pathSub(ep); const body=bodyJson(ep);
  if(ep.mode==="basic"){
    const qs=reqFields(ep.query).map(p=>p.n+"="+qval(p)); const q=qs.length?"?"+qs.join("&"):"";
    return '// Browser / Deno / edge — Web Crypto\nconst res = await fetch("'+BASE+path+q+'", {\n  headers: {\n    Authorization: "Basic " + btoa(`${KEY_ID}:${SECRET}`),\n    Accept: "application/vnd.symplehost.partner.v1+json",\n  },\n});\nconst json = await res.json();';
  }
  return '// Browser / Deno / edge — Web Crypto (SubtleCrypto).\n// Do NOT expose a partner secret to an untrusted browser — sign on your server/edge.\nconst enc = new TextEncoder();\nconst sha256Hex = async (s) =>\n  [...new Uint8Array(await crypto.subtle.digest("SHA-256", enc.encode(s)))]\n    .map(b => b.toString(16).padStart(2, "0")).join("");\nconst hmacB64 = async (secret, msg) => {\n  const k = await crypto.subtle.importKey("raw", enc.encode(secret),\n    { name: "HMAC", hash: "SHA-256" }, false, ["sign"]);\n  return btoa(String.fromCharCode(...new Uint8Array(await crypto.subtle.sign("HMAC", k, enc.encode(msg)))));\n};\n\n'+
    'const method = "'+ep.method+'", path = "'+ep.path+'";\n'+
    (body? 'const body = JSON.stringify('+ body.replace(/\n/g,"\n  ") +');\n' : 'const body = "";\n')+
    'const ts = Math.floor(Date.now() / 1000).toString();\n'+
    'const sig = await hmacB64(SECRET, `${method}\\n${path}\\n${ts}\\n${await sha256Hex(body)}`);\n\n'+
    'const res = await fetch("'+BASE+path+'", {\n  method,\n  headers: {\n    "X-SH-Key-Id": KEY_ID,\n    "X-SH-Timestamp": ts,\n'+
    (ep.method!=="GET" ? '    "X-SH-Nonce": crypto.randomUUID(),\n' : '')+
    '    "X-SH-Signature": sig,\n'+
    (ep.idem ? '    "Idempotency-Key": crypto.randomUUID(),'+(ep.idemRequired?' // mandatory':'')+'\n' : '')+
    (body ? '    "Content-Type": "application/json",\n' : '')+
    '    Accept: "application/vnd.symplehost.partner.v1+json",\n  },\n'+
    (body ? '  body,\n' : '')+
    '});\nconst json = await res.json();';
}

/* ---- Authentication page samples: Basic + HMAC per language ---- */
function authCode(lang){
  const ppath = PREFIX+"/listings/<id>/pricing";
  if(lang==="curl"){
    return '# Basic — read-only scopes\ncurl "'+BASE+PREFIX+'/properties" \\\n  -u "$SH_KEY_ID:$SH_SECRET" \\\n  -H "Accept: application/vnd.symplehost.partner.v1+json"\n\n'+
      '# HMAC — sensitive scopes (sign METHOD\\npath\\nts\\nsha256(body))\nTS=$(date +%s)\nBODY=\'{"currency":"USD","rates":{"2026-07-02":140.0}}\'\nHASH=$(printf %s "$BODY" | shasum -a 256 | cut -d" " -f1)\nCANON=$(printf \'%s\\n%s\\n%s\\n%s\' PUT '+ppath+' $TS $HASH)\nSIG=$(printf %s "$CANON" | openssl dgst -sha256 -hmac "$SH_SECRET" -hex | sed 's/.* //')\n\ncurl -X PUT "'+BASE+ppath+'" \\\n  -H "X-SH-Key-Id: $SH_KEY_ID" \\\n  -H "X-SH-Timestamp: $TS" \\\n  -H "X-SH-Nonce: $(uuidgen)" \\\n  -H "X-SH-Signature: $SIG" \\\n  -H "Idempotency-Key: $(uuidgen)" \\\n  -H "Content-Type: application/json" \\\n  -d "$BODY"';
  }
  if(lang==="node"){
    return 'import { createHash, createHmac, randomUUID } from "crypto";\nconst BASE = "'+BASE+'";\n\n'+
      '// Basic — read-only scopes\nconst basic = "Basic " + Buffer.from(`${KEY_ID}:${SECRET}`).toString("base64");\nawait fetch(`${BASE}'+PREFIX+'/properties`, { headers: { Authorization: basic } });\n\n'+
      '// HMAC — sensitive scopes\nfunction sign(method, path, body = "") {\n  const ts = Math.floor(Date.now() / 1000).toString();\n  const hash = createHash("sha256").update(body).digest("hex");\n  const sig = createHmac("sha256", SECRET).update(`${method}\\n${path}\\n${ts}\\n${hash}`).digest("hex");\n  return { ts, sig };\n}\n\nconst path = "'+ppath+'";\nconst body = JSON.stringify({ currency: "USD", rates: { "2026-07-02": 140.0 } });\nconst { ts, sig } = sign("PUT", path, body);\nawait fetch(`${BASE}${path}`, {\n  method: "PUT",\n  headers: {\n    "X-SH-Key-Id": KEY_ID, "X-SH-Timestamp": ts,\n    "X-SH-Nonce": randomUUID(), "X-SH-Signature": sig,\n    "Idempotency-Key": randomUUID(), "Content-Type": "application/json",\n  },\n  body,\n});';
  }
  if(lang==="js"){
    return '// Browser / Deno / edge — Web Crypto. Do NOT expose a partner secret\n// to an untrusted browser; sign on your server or a trusted edge.\nconst BASE = "'+BASE+'", enc = new TextEncoder();\n\n'+
      'const sha256Hex = async (s) =>\n  [...new Uint8Array(await crypto.subtle.digest("SHA-256", enc.encode(s)))]\n    .map(b => b.toString(16).padStart(2, "0")).join("");\nconst hmacB64 = async (secret, msg) => {\n  const k = await crypto.subtle.importKey("raw", enc.encode(secret),\n    { name: "HMAC", hash: "SHA-256" }, false, ["sign"]);\n  return btoa(String.fromCharCode(...new Uint8Array(await crypto.subtle.sign("HMAC", k, enc.encode(msg)))));\n};\n\n'+
      '// Basic — read-only scopes\nawait fetch(`${BASE}'+PREFIX+'/properties`, {\n  headers: { Authorization: "Basic " + btoa(`${KEY_ID}:${SECRET}`) },\n});\n\n'+
      '// HMAC — sensitive scopes\nconst path = "'+ppath+'";\nconst body = JSON.stringify({ currency: "USD", rates: { "2026-07-02": 140.0 } });\nconst ts = Math.floor(Date.now() / 1000).toString();\nconst sig = await hmacB64(SECRET, `PUT\\n${path}\\n${ts}\\n${await sha256Hex(body)}`);\nawait fetch(`${BASE}${path}`, {\n  method: "PUT",\n  headers: {\n    "X-SH-Key-Id": KEY_ID, "X-SH-Timestamp": ts,\n    "X-SH-Nonce": crypto.randomUUID(), "X-SH-Signature": sig,\n    "Idempotency-Key": crypto.randomUUID(), "Content-Type": "application/json",\n  },\n  body,\n});';
  }
  return 'import time, json, hmac, hashlib, uuid, requests\nBASE = "'+BASE+'"\n\n'+
    '# Basic — read-only scopes\nrequests.get(f"{BASE}'+PREFIX+'/properties", auth=(KEY_ID, SECRET))\n\n'+
    '# HMAC — sensitive scopes\ndef sign(method, path, body=""):\n    ts = str(int(time.time()))\n    h = hashlib.sha256(body.encode()).hexdigest()\n    canon = f"{method}\\n{path}\\n{ts}\\n{h}"\n    sig = hmac.new(SECRET.encode(), canon.encode(), hashlib.sha256).hexdigest()\n    return ts, sig\n\npath = "'+ppath+'"\nbody = json.dumps({"currency": "USD", "rates": {"2026-07-02": 140.0}})\nts, sig = sign("PUT", path, body)\nrequests.put(f"{BASE}{path}", data=body, headers={\n    "X-SH-Key-Id": KEY_ID, "X-SH-Timestamp": ts,\n    "X-SH-Nonce": str(uuid.uuid4()), "X-SH-Signature": sig,\n    "Idempotency-Key": str(uuid.uuid4()), "Content-Type": "application/json",\n})';
}

function renderWebhooks(){

   '<div class="secl">Delivery headers</div>'+
   '<table><tr><th>Header</th><th>Meaning</th></tr>'+
   '<tr><td><code>X-SH-Signature</code></td><td><code>v1=&lt;hex&gt;</code> — HMAC-SHA256 over <code>"&lt;timestamp&gt;.&lt;raw_body&gt;"</code>.</td></tr>'+
   '<tr><td><code>X-SH-Timestamp</code></td><td>Unix seconds the delivery was signed (re-stamped on each retry).</td></tr>'+
   '<tr><td><code>X-SH-Event-Id</code></td><td>Stable, deterministic event id — <b>dedupe on this</b>.</td></tr>'+
   '<tr><td><code>X-SH-Event-Type</code></td><td>e.g. <code>reservation.updated</code>.</td></tr></table>'+
   '<div class="secl">To verify</div>'+
   '<table><tr><td><b>1</b></td><td>Read the <b>exact raw request body</b> — do not parse to JSON first (re-serializing changes bytes and breaks the signature).</td></tr>'+
   '<tr><td><b>2</b></td><td>Reject if <code>|now − X-SH-Timestamp| &gt; 300s</code> (replay window).</td></tr>'+
   '<tr><td><b>3</b></td><td>Recompute <code>HMAC-SHA256(signing_secret, "&lt;ts&gt;.&lt;raw_body&gt;")</code> and constant-time compare to the header.</td></tr>'+

    '<div class="card"><div class="ch"><span class="title">Verify · Node</span></div><pre>'+hl(
      'import { createHmac, timingSafeEqual } from "crypto";\n\n'+
      '// raw = exact body bytes (e.g. express.raw())\nfunction verify(raw, headers, signingSecret) {\n  const ts  = headers["x-sh-timestamp"];\n  const sig = (headers["x-sh-signature"] || "").replace(/^v1=/, "");\n  if (Math.abs(Date.now() / 1000 - Number(ts)) > 300) return false;\n  const expected = createHmac("sha256", signingSecret)\n    .update(`${ts}.${raw}`).digest("hex");\n  const a = Buffer.from(sig), b = Buffer.from(expected);\n  return a.length === b.length && timingSafeEqual(a, b);\n}\n// then: dedupe on headers["x-sh-event-id"] before processing')+'</pre></div>'+
    '<div class="card"><div class="ch"><span class="title">Verify · Python</span></div><pre>'+hl(
      'import time, hmac, hashlib\n\n'+
      'def verify(raw: bytes, headers, signing_secret: str) -> bool:\n    ts  = headers.get("X-SH-Timestamp", "")\n    sig = headers.get("X-SH-Signature", "").removeprefix("v1=")\n    if abs(time.time() - int(ts)) > 300:\n        return False\n    expected = hmac.new(\n        signing_secret.encode(),\n        f"{ts}.".encode() + raw,\n        hashlib.sha256,\n    ).hexdigest()\n    return hmac.compare_digest(sig, expected)\n# then: dedupe on headers["X-SH-Event-Id"] before processing')+'</pre></div>';
}
function renderSchema(){
  const ep=byId(state.ep);
  document.getElementById("doc").innerHTML =
    '<div class="crumb">'+ep.g+' / '+ep.name+'</div><h1>'+ep.name+'</h1>'+
    '<p class="lede">'+ep.summary+'</p>'+
    '<div class="secl">Fields</div>'+attrRows(ep.attrs);
  document.getElementById("code").innerHTML =
    '<div class="card"><div class="ch"><span class="title">Example</span></div><pre>'+hl(fillResp(ep.resp))+'</pre></div>';
}
function renderEndpoint(){
  const ep=byId(state.ep); const lang=state.lang;
  const samples={ curl:curlFor(ep), node:nodeFor(ep), js:jsFor(ep), python:pyFor(ep) };
  const scopeChip = '<span class="pill pill-scope">'+ep.scope+'</span>';
  const idemChip = ep.idem ? '<span class="pill pill-idem">Idempotency-Key'+(ep.idemRequired?' (required)':'')+'</span>' : '';
  document.getElementById("doc").innerHTML =
    '<div class="crumb">'+ep.g+' / '+ep.name+'</div>'+
    '<h1>'+ep.name+'</h1>'+
    '<div class="ep">'+tagOf(ep.method)+' <code>'+ep.path+'</code> '+modePill(ep)+' '+scopeChip+' '+idemChip+'</div>'+
    '<p class="lede">'+ep.summary+'</p>'+
    (ep.warn?'<div class="warn"><span class="wi">!</span><div>'+ep.warn+'</div></div>':'')+
    (ep.pathp?'<div class="secl">Path parameters</div>'+attrRows(ep.pathp):'')+
    (ep.query?'<div class="secl">Query parameters</div>'+attrRows(ep.query):'')+
    (ep.body?'<div class="secl">Body parameters</div>'+attrRows(ep.body):'');
  const tabs=langTabs(lang);
  document.getElementById("code").innerHTML =
    '<div class="card"><div class="ch"><span class="title">Request</span>'+tabs+'</div><pre>'+hl(samples[lang])+'</pre></div>'+
    '<div class="card"><div class="ch"><span class="title">Response</span><span class="pill200">'+(ep.status||"200")+'</span></div><pre>'+hl(fillResp(ep.resp))+'</pre></div>';
}
function render(){
  const ep=byId(state.ep);
  if(ep.overview) renderOverview();
  else if(ep.auth) renderAuth();
  else if(ep.conventions) renderConventions();
  else if(ep.webhooks) renderWebhooks();
  else if(ep.schema) renderSchema();
  else renderEndpoint();
  buildNav(document.getElementById("search").value);
}

/* ---------- events ---------- */
document.getElementById("nav").addEventListener("click", e=>{ const a=e.target.closest("[data-ep]"); if(!a) return; state.ep=a.dataset.ep; render(); document.getElementById("doc").scrollTop=0; });
document.getElementById("code").addEventListener("change", e=>{ const s=e.target.closest("#langsel"); if(!s) return; state.lang=s.value; const ep=byId(state.ep); if(ep&&ep.auth) renderAuthCode(); else renderEndpoint(); });
document.getElementById("search").addEventListener("input", e=>buildNav(e.target.value));
document.getElementById("themeBtn").addEventListener("click", ()=>{ const d=document.body.classList.toggle("dark"); document.getElementById("themeBtn").textContent=d?"☀ Light":"🌙 Dark"; });

buildNav(); render();
</script>
</body>
</html>
