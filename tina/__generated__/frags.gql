fragment CategoryParts on Category {
  __typename
  title
  description
  emoji
  order
}

fragment ArticleParts on Article {
  __typename
  title
  description
  category
  section
  sectionOrder
  tags
  date
  draft
  body
}

fragment EventParts on Event {
  __typename
  title
  description
  eventType
  eventDate
  duration
  youtubeId
  registerUrl
  thumbnail
  speakers {
    __typename
    name
    role
    avatar
  }
  cohosts {
    __typename
    name
    logo
    url
  }
  tags
  draft
  body
}
